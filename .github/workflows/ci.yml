name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Check unfinished public text
        run: |
          ! grep -R "追記してください" app components data README.md
          ! grep -R "TODO" app components data README.md
          ! grep -R "FIXME" app components data README.md
